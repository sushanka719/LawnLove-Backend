services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: lawn
    ports:
      - '5432:5432'
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://postgres:UWhCuyqKcOtJPuA7NFcCES6K70vRoDXqIUAjb9lb69h2OoiFcBbIRh5Mb91raOiK@d13o1o7zw8s9xkcvcvri14qg:5432/postgres
    ports:
      - '3000:3000'
    depends_on:
      db:
        condition: service_healthy

volumes:
  db-data:
