name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: lawn_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/lawn_test
      BETTER_AUTH_SECRET: ci-test-secret-please-replace-in-real-envs-000000
      BETTER_AUTH_URL: http://localhost:3000
      STRIPE_SECRET_KEY: sk_test_ci_placeholder
      RESEND_API_KEY: ci_placeholder
      GOOGLE_CLIENT_ID: ci_placeholder
      GOOGLE_CLIENT_SECRET: ci_placeholder

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm exec prisma generate

      - name: Lint
        run: pnpm lint

      - name: Run database migrations
        run: pnpm exec prisma migrate deploy

      - name: Unit tests
        run: pnpm test

      - name: Build
        run: pnpm build
